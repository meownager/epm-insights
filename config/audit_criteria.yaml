# Audit Criteria Register
# This is the only place thresholds live. Every change must increment version
# and record a reason. The audit engine reads this file at runtime — thresholds
# are never hardcoded in source.

version: "2.0.0"
effective_date: "2026-07-14"
change_reason: "Add billing-type-specific thresholds. Fixed fee: tight budget tolerance (margin at risk on overruns). T&E: looser budget tolerance (client pays actuals), same hours and schedule thresholds. Project IDs updated to NNNNN-F / NNNNN-T format matching real data."

completed_projects:
  # Projects in these states are eligible for the completed-project audit slice.
  eligible_statuses:
    - completed
    - closed

  # Fixed fee: company absorbs cost overruns — budget deviation directly hits margin.
  fixed_fee:
    budget:
      green_max: 0.15    # ≤15% over/under proposed budget → Green
      yellow_max: 0.30   # >15% and ≤30% → Yellow; >30% → Red
    hours:
      green_max: 0.15    # ≤15% over/under proposed hours → Green
      yellow_max: 0.30   # >15% and ≤30% → Yellow; >30% → Red
    schedule:
      green_max_days: 7    # ≤7 days late → Green
      yellow_max_days: 21  # >7 and ≤21 days late → Yellow; >21 days → Red

  # T&E: client pays actual hours and expenses — budget risk is lower (NTE cap breach).
  # Hours accuracy still matters for estimate quality and future quoting.
  t_and_e:
    budget:
      green_max: 0.25    # ≤25% over/under proposed estimate → Green
      yellow_max: 0.40   # >25% and ≤40% → Yellow; >40% → Red
    hours:
      green_max: 0.15    # ≤15% over/under proposed hours → Green (same as fixed fee)
      yellow_max: 0.30   # >15% and ≤30% → Yellow; >30% → Red
    schedule:
      green_max_days: 7    # ≤7 days late → Green (same as fixed fee)
      yellow_max_days: 21  # >7 and ≤21 days late → Yellow; >21 days → Red
