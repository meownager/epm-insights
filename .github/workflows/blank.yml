name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-and-smoke:
    name: Test + smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Cross-platform CLI smoke run
        run: |
          python scripts/completed_project_health.py --proposal data/sample/proposal_projects.csv --actual data/sample/actual_projects.csv --output-dir outputs/smoke
          python scripts/generate_html_report.py --detail outputs/smoke/completed_project_health_detail.csv --run-record outputs/smoke/runs/run_*.json --output outputs/smoke/audit_report.html

  dependency-security:
    name: Dependency security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Check dependency consistency
        run: python -m pip check
      - name: Audit dependencies
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements.txt

  reproducibility-bundle:
    name: Build reproducibility bundle
    runs-on: ubuntu-latest
    needs: test-and-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Build bundle
        run: python scripts/build_repro_bundle.py --output-dir outputs/repro
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: epm-insights-repro-bundle
          path: outputs/repro/*

  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
