<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock | epm-insights</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>World Clock</h1>
        <p>Live time across multiple time zones.</p>
      </header>

      <section class="controls">
        <label class="toggle" for="hourFormatToggle">
          <input id="hourFormatToggle" type="checkbox" />
          <span>Use 24-hour format</span>
        </label>

        <div class="add-zone">
          <label for="timezoneSelect">Add time zone</label>
          <select id="timezoneSelect"></select>
          <button id="addZoneBtn" type="button">Add</button>
        </div>
      </section>

      <section>
        <ul id="clockList" class="clock-list" aria-live="polite"></ul>
      </section>
    </main>

    <template id="clockItemTemplate">
      <li class="clock-item">
        <div>
          <h2 class="zone-label"></h2>
          <p class="zone-id"></p>
        </div>
        <div class="time-wrap">
          <p class="time"></p>
          <button class="remove-btn" type="button" aria-label="Remove time zone">Remove</button>
        </div>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
